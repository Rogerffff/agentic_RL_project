# CaRR Deep Search — SFT cold-start config
# Usage: torchrun --nproc_per_node=$NGPUS -m verl.trainer.fsdp_sft_trainer \
#            --config-path=examples/carr_deepsearch/config --config-name=carr_sft

hydra:
  searchpath:
    - file://verl/trainer/config

defaults:
  - sft_trainer
  - _self_

model:
  partial_pretrain: Qwen/Qwen3-4B
  enable_gradient_checkpointing: true
  trust_remote_code: true
  strategy: fsdp
  fsdp_config:
    model_dtype: bf16

data:
  train_files: examples/carr_deepsearch/data/sft_train.parquet
  val_files: examples/carr_deepsearch/data/sft_val.parquet
  max_length: 65536
  train_batch_size: 4
  micro_batch_size_per_gpu: 1
  ignore_input_ids_mismatch: true
  truncation: loss_window  # keep the window with the most assistant supervision on long trajectories
  multiturn:
    enable: true
    messages_key: messages
    tools_key: tools
    enable_thinking_key: enable_thinking

# fsdp_sft_trainer reads top-level use_remove_padding
use_remove_padding: true

optim:
  lr: 4.0e-5

trainer:
  total_epochs: 3
  project_name: carr_deepsearch_sft
  experiment_name: carr-sft-qwen3-4b
  logger: ['console', 'wandb']
  default_local_dir: ${oc.env:HOME}/checkpoints/carr_deepsearch_sft
  save_freq: 198  # ~1 epoch = ceil(791/4), saves 3 checkpoints over 3 epochs
  test_freq: 198
  nnodes: 1
  n_gpus_per_node: 8
  checkpoint:
    save_contents: ["model", "optimizer", "extra", "hf_model"]
